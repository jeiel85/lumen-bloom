      <stop offset="18%" stop-color="#40d0ff"/>
      <stop offset="48%" stop-color="#8040ff"/>
      <stop offset="75%" stop-color="#d040c0"/>
      <stop offset="100%" stop-color="#500070" stop-opacity="0"/>
    </radialGradient>

