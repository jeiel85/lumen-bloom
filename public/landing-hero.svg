  <style>
    @keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
    @keyframes twinkle { 0%,100%{opacity:.8} 50%{opacity:.15} }
    @keyframes twinkle-alt { 0%,100%{opacity:.2} 50%{opacity:.75} }
    .pa { animation: pulse 2.2s ease-in-out infinite }
    .pb { animation: pulse 3s ease-in-out .6s infinite }
    .pc { animation: pulse 4s ease-in-out 1.2s infinite }
    .tw-a { animation: twinkle 3.2s ease-in-out infinite }
    .tw-b { animation: twinkle-alt 4.6s ease-in-out 1.5s infinite }
    .tw-c { animation: twinkle 5.8s ease-in-out 3s infinite }
  </style>
