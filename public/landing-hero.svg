    <line x1="640" y1="318" x2="640" y2="446" stroke="#ffee88" stroke-width="1" opacity="0.28"/>
    <line x1="578" y1="382" x2="702" y2="382" stroke="#ffee88" stroke-width="1" opacity="0.28"/>
    <line x1="597" y1="339" x2="683" y2="425" stroke="#ffee88" stroke-width="0.8" opacity="0.2"/>
