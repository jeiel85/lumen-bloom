    <text x="210" y="502" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#5060a0">Droplet</text>
  </g>

  <!-- ── Stage 3: Ripple ── -->
  <g id="s3">
    <circle cx="338" cy="452" r="35" fill="none" stroke="#00ffd0" stroke-width="0.6" opacity="0.35" class="pc"/>
    <circle cx="338" cy="452" r="27" fill="none" stroke="#00ffd0" stroke-width="0.6" opacity="0.45"/>
    <circle cx="338" cy="452" r="35" fill="#00ffd0" opacity="0.07" class="pa" filter="url(#glow-sm)"/>
    <circle cx="338" cy="452" r="18" fill="url(#o3)" filter="url(#glow-sm)"/>
    <text x="338" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#5060a0">Ripple</text>
  </g>

  <!-- ── Stage 4: Moonlit Lake ── -->
  <g id="s4">
    <circle cx="480" cy="420" r="60" fill="#0080ff" opacity="0.09" class="pb" filter="url(#glow-md)"/>
    <circle cx="480" cy="420" r="42" fill="#0080ff" opacity="0.12"/>
