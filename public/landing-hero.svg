<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glow-micro" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-xl" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="title-glow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="bg-grad" cx="38%" cy="62%" r="80%">
      <stop offset="0%" stop-color="#0d1540"/>
      <stop offset="55%" stop-color="#06091c"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <radialGradient id="neb-pur" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#380c6c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#380c6c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb-cyn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003d6e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#003d6e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="o1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c8d8ff"/>
      <stop offset="100%" stop-color="#8090c0" stop-opacity="0"/>
