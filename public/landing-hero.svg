  <!-- Evolution trail -->
  <path d="M 90,500 C 155,488 180,482 210,478 C 278,470 308,460 338,452 C 415,438 452,428 480,420 C 562,405 602,393 640,382 C 732,366 778,352 820,338 C 922,314 972,302 1020,288 C 1092,270 1142,256 1190,232"
        fill="none" stroke="#1e3858" stroke-width="1.2" stroke-dasharray="4,9" opacity="0.5"/>

  <!-- ── Stage 1: Light Dust ── -->
  <g id="s1">
    <circle cx="90" cy="500" r="14" fill="#d0e8ff" opacity="0.12" class="pa" filter="url(#glow-sm)"/>
    <circle cx="90" cy="500" r="4" fill="url(#o1)" filter="url(#glow-micro)"/>
    <text x="90" y="522" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#5060a0">Light Dust</text>
  </g>

  <!-- ── Stage 2: Droplet ── -->
  <g id="s2">
    <circle cx="210" cy="478" r="28" fill="#00e8ff" opacity="0.09" class="pb" filter="url(#glow-sm)"/>
    <circle cx="210" cy="478" r="16" fill="#00e8ff" opacity="0.14"/>
