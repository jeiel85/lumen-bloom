    <radialGradient id="o3" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c0ffff"/>
      <stop offset="40%" stop-color="#00ffd0"/>
      <stop offset="100%" stop-color="#007060" stop-opacity="0"/>
