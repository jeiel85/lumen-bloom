    <radialGradient id="o4" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#a0d0ff"/>
      <stop offset="40%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#002080" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o5" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fffff8"/>
      <stop offset="25%" stop-color="#fff088"/>
      <stop offset="65%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#a02800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o6" cx="35%" cy="30%" r="65%">
